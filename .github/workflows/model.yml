name: ModelOps - Retrain and Deploy

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of training epochs'
        required: false
        default: '2'
  schedule:
    - cron: '0 2 * * 0'

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Retrain model
        run: |
          chmod +x mvnw
          ./mvnw exec:java -Dexec.mainClass="ch.zhaw.deeplearningjava.footwear.Training" -B

      - name: Upload model to Azure Blob Storage
        env:
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          pip install azure-storage-blob -q
          python3 << 'EOF'
          import os
          from azure.storage.blob import BlobServiceClient

          conn_str = os.environ["AZURE_STORAGE_CONNECTION_STRING"]
          client = BlobServiceClient.from_connection_string(conn_str)

          # Höchsten Suffix der bestehenden Containers finden
          suffix = 0
          for c in client.list_containers():
              name = c["name"]
              if name.startswith("footwear-model-"):
                  try:
                      s = int(name.split("-")[-1])
                      suffix = max(suffix, s)
                  except ValueError:
                      pass

          # Neuen Container erstellen
          suffix += 1
          container_name = f"footwear-model-{suffix}"
          print(f"Erstelle Container: {container_name}")
          client.create_container(container_name)

          # Modell-Dateien hochladen
          container_client = client.get_container_client(container_name)
          for fname in os.listdir("models"):
              path = f"models/{fname}"
              with open(path, "rb") as f:
                  container_client.upload_blob(fname, f)
              print(f"Hochgeladen: {fname}")
          EOF

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Rebuild and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/djl-footwear-classification:latest

      - name: Deploy updated model to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: djl-footwear-classification
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKER_USERNAME }}/djl-footwear-classification:latest
