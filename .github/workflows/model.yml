name: ModelOps - Retrain and Deploy

on:
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Number of training epochs'
        required: false
        default: '2'
  schedule:
    - cron: '0 2 * * 0'

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Retrain model
        run: |
          chmod +x mvnw
          ./mvnw exec:java -Dexec.mainClass="ch.zhaw.deeplearningjava.footwear.Training" -B

      - name: Commit updated model
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add models/
          git commit -m "model: retrain shoeclassifier [skip ci]" || echo "No changes to commit"
          git push

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Rebuild and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/djl-footwear-classification:latest

      - name: Deploy updated model to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: djl-footwear-classification
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKER_USERNAME }}/djl-footwear-classification:latest
